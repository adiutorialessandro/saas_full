{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px; margin: 0 auto;">
  <h1>Login</h1>
  <p class="muted">Accedi per continuare.</p>

  <form method="post">
    {{ form.hidden_tag() }}

    <label>Email</label>
    {{ form.email(class_="input", placeholder="es. admin@demo.it") }}

    <label>Password</label>
    {{ form.password(class_="input", placeholder="••••••••") }}

    <div style="height:12px"></div>
    <button class="btn" type="submit">{{ form.submit.label.text }}</button>
  </form>

  <div style="height:14px"></div>
  <p class="muted">
    Non hai un account?
    <a href="{{ url_for('auth.register') }}">Registrati</a>
  </p>
</div>
{% endblock %}
