{% extends "base.html" %}
{% block content %}
<h1>Login</h1>
<form method="post" class="card">
  {{ form.hidden_tag() }}
  <label>Email</label>
  {{ form.email(class_="input") }}
  <label>Password</label>
  {{ form.password(class_="input") }}
  <button class="btn">{{ form.submit.label.text }}</button>
  <p class="muted">Non hai un account? <a href="{{ url_for('auth.register') }}">Registrati</a></p>
</form>
{% endblock %}
