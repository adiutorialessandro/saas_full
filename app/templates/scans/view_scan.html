{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 1200px; margin: 30px auto; padding: 0 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 2px solid #e8eef5; padding-bottom: 20px;">
        <div>
            <h1 style="font-size: 2.5rem; font-weight: 900;">Report: {{ scan.settore }}</h1>
            <p class="muted">Analisi generata il {{ scan.created_at.strftime('%d/%m/%Y') }} per il mese {{ scan.mese_riferimento }}</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <a href="{{ url_for('scans.scan_pdf', scan_id=scan.id) }}" class="btn btn-secondary" style="padding: 10px 20px; text-decoration: none;">
                <i class="fas fa-file-pdf"></i> Scarica PDF Full
            </a>
            <a href="{{ url_for('wizard.step1') }}" class="btn-nav-action" style="padding: 10px 20px; text-decoration: none;">
                <i class="fas fa-redo"></i> Nuovo Scan
            </a>
        </div>
    </div>

    {% include "report_full.html" %}

</div>
{% endblock %}
