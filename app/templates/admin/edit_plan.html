{% extends "base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h2 class="mb-4">Modifica Piano: <span class="text-primary">{{ plan.name }}</span></h2>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Nome Piano</label>
                    <input type="text" name="name" class="form-control" value="{{ plan.name }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Limite Scan Mensili</label>
                    <small class="text-muted d-block mb-2">Inserisci -1 per "Illimitato".</small>
                    <input type="number" name="scan_limit" class="form-control" value="{{ plan.scan_limit }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label font-weight-bold">Prezzo Mensile (€)</label>
                    <input type="number" step="0.01" name="price_month" class="form-control" value="{{ plan.price_month }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label font-weight-bold">Stripe Price ID</label>
                    <small class="text-muted d-block mb-2">L'ID generato dalla dashboard di Stripe (es. price_1N...)</small>
                    <input type="text" name="stripe_price_id" class="form-control" value="{{ plan.stripe_price_id }}">
                </div>
                
                <div class="d-flex justify-content-between">
                    <a href="{{ url_for('admin.plans') }}" class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-primary px-4">Salva Modifiche</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
