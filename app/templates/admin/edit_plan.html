{% extends "base.html" %}

{% block content %}
<style>
    .admin-form-container {
        max-width: 600px;
        margin: 40px auto;
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        border: 1px solid #edf2f7;
    }
    .admin-form-header { margin-bottom: 30px; }
    .admin-form-header h2 { color: #1a202c; font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; }
    .admin-form-header p { color: #718096; font-size: 1rem; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; font-size: 0.95rem; }
    .form-control { width: 100%; padding: 12px 16px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-control:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1); }
    .help-text { font-size: 0.85rem; color: #a0aec0; margin-top: 5px; display: block; }
    .form-actions { display: flex; gap: 15px; margin-top: 30px; align-items: center; }
    .btn-submit { background: #3182ce; color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .btn-submit:hover { background: #2b6cb0; }
    .btn-cancel { background: #edf2f7; color: #4a5568; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 1rem; text-decoration: none; transition: background 0.2s; }
    .btn-cancel:hover { background: #e2e8f0; color: #2d3748; }
</style>

<div class="admin-form-container">
    <div class="admin-form-header">
        <h2>Modifica Piano: <span style="color: #3182ce;">{{ plan.name }}</span></h2>
        <p>Aggiorna i dettagli, i prezzi e i limiti operativi del piano.</p>
    </div>

    <form method="POST">
        
        <div class="form-group">
            <label>Nome Piano</label>
            <input type="text" name="name" class="form-control" value="{{ plan.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Limite Scan Mensili</label>
            <input type="number" name="scan_limit" class="form-control" value="{{ plan.scan_limit }}" required>
            <span class="help-text">Inserisci -1 per "Illimitato".</span>
        </div>
        
        <div class="form-group">
            <label>Prezzo Mensile (€)</label>
            <input type="number" step="0.01" name="price_month" class="form-control" value="{{ plan.price_month }}" required>
        </div>
        
        <div class="form-group">
            <label>Stripe Price ID</label>
            <input type="text" name="stripe_price_id" class="form-control" value="{{ plan.stripe_price_id or '' }}" placeholder="es. price_1N...">
            <span class="help-text">L'ID generato dalla dashboard di Stripe per gestire gli abbonamenti.</span>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">Salva Modifiche</button>
            <a href="{{ url_for('admin.plans') }}" class="btn-cancel">Annulla</a>
        </div>
    </form>
</div>
{% endblock %}
