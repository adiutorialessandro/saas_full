{% extends "base.html" %}
{% block content %}

<h1>Clienti (Organizations)</h1>

<div class="card">
<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Nome azienda</th>
<th>Owner</th>
<th>Utenti</th>
<th>Scans</th>
</tr>
</thead>

<tbody>
{% for r in rows %}
<tr>
<td>{{ r.org.id }}</td>
<td>{{ r.org.name }}</td>
<td>{{ r.owner }}</td>
<td>{{ r.users }}</td>
<td>{{ r.scans }}</td>
</tr>
{% endfor %}
</tbody>

</table>
</div>

{% endblock %}
