{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="font-size: 2.2rem; font-weight: 800;">Gestione Organizzazioni</h1>
        <a href="{{ url_for('admin.index') }}" class="btn btn-secondary" style="text-decoration: none; padding: 10px 20px;">Torna Indietro</a>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f9fafb; border-bottom: 2px solid #e8eef5; text-align: left;">
                    <th style="padding: 15px 20px;">AZIENDA</th>
                    <th style="padding: 15px 20px;">OWNER</th>
                    <th style="padding: 15px 20px;">PIANO</th>
                    <th style="padding: 15px 20px;">UTENTI</th>
                    <th style="padding: 15px 20px;">SCAN</th>
                    <th style="padding: 15px 20px; text-align: right;">AZIONI</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr style="border-bottom: 1px solid #e8eef5;">
                    <td style="padding: 15px 20px; font-weight: 800;">{{ row.org.name }}</td>
                    <td style="padding: 15px 20px; color: #64748b;">{{ row.owner }}</td>
                    <td style="padding: 15px 20px;"><span class="badge badge-green">{{ row.plan_name }}</span></td>
                    <td style="padding: 15px 20px;">{{ row.users }}</td>
                    <td style="padding: 15px 20px;">{{ row.scans }}</td>
                    <td style="padding: 15px 20px; text-align: right;">
                        <a href="{{ url_for('admin.organization_detail', org_id=row.org.id) }}" style="color: #29b6f6; text-decoration: none; font-weight: 700;">Gestisci</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
