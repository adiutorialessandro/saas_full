{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:560px; margin: 0 auto;">
  <h1>Modifica ruolo utente</h1>
  <p class="muted">Utente: {{ user.email }} · Azienda: {{ org.name }}</p>

  <form method="post">
    {{ form.hidden_tag() }}

    <label>Ruolo</label>
    {{ form.role(class_="input", placeholder="owner / admin / manager / member") }}

    <div style="height:12px"></div>
    <button class="btn" type="submit">{{ form.submit.label.text }}</button>
    <a class="btn" href="{{ url_for('admin.organization_detail', org_id=org.id) }}">Annulla</a>
  </form>
</div>

{% endblock %}
