{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:560px; margin: 0 auto;">
  <h1>Aggiorna piano</h1>
  <p class="muted">
    Azienda: {{ org.name }}
    {% if org.plan %}
      <br>Piano attuale: <b>{{ org.plan.name }}</b>
    {% else %}
      <br>Piano attuale: <b>Nessuno</b>
    {% endif %}
  </p>

  <form method="post">
    {{ form.hidden_tag() }}

    <label>Piano</label>
    {{ form.plan_id(class_="input") }}

    <div style="height:12px"></div>
    <button class="btn" type="submit">{{ form.submit.label.text }}</button>
    <a class="btn" href="{{ url_for('admin.organization_detail', org_id=org.id) }}">Annulla</a>
  </form>
</div>

{% endblock %}
