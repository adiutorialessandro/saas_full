{% extends "base.html" %}
{% block content %}

<div style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">

  <div class="card" style="width: 100%; max-width: 520px; text-align: center; padding: 40px;">

    <div style="width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 16px; background: var(--bg-sidebar); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--accent-blue); font-weight: 800;">
      ⌁
    </div>

    <h1 style="font-size: 28px; margin-bottom: 10px;">
      Analisi del business in corso
    </h1>

    <p class="muted" style="margin-bottom: 30px; line-height: 1.6;">
      Il sistema sta elaborando i dati e generando il report strategico.
    </p>

    <div style="width: 100%; height: 12px; border-radius: 999px; background: var(--bg-main); overflow: hidden; margin-bottom: 16px;">
      <div id="progressBar" style="height: 100%; width: 5%; border-radius: 999px; background: var(--accent-blue); transition: width 0.5s ease;"></div>
    </div>

    <div class="muted" id="statusText" style="font-size: 14px; font-weight: 600;">
      Inizializzazione analisi...
    </div>

  </div>

</div>

<script>
const steps = [
  "Raccolta dati aziendali...",
  "Analisi stabilità finanziaria...",
  "Calcolo rischio operativo...",
  "Analisi acquisizione clienti...",
  "Generazione KPI sintetici...",
  "Costruzione piano d’azione...",
  "Preparazione report finale..."
];

let i = 0;
let progress = 0;

function updateStatus(){
  if(i < steps.length){
      document.getElementById("statusText").innerText = steps[i];
      i++;
  }

  progress += 14;

  if(progress > 100){
      progress = 100;
  }

  document.getElementById("progressBar").style.width = progress + "%";
}

setInterval(updateStatus, 900);

setTimeout(function(){
    window.location.href = "{{ url_for('scans.view_scan', scan_id=scan.id) }}";
}, 6500);
</script>

{% endblock %}
